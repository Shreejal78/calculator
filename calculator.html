<!DOCTYPE html>
<html>

<head>
  <meta charset="UTF-8">
  <meta name="viewport"
    content="width=device-width, initial-scale=1">
  <title></title>
  <link rel="stylesheet"
    href="calculator.css">
    <link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link href="https://fonts.googleapis.com/css2?family=Press+Start+2P&display=swap" rel="stylesheet">
</head>

<body>
  <h1>CALCULATOR</h1>
  <div class="calculator">
    <div class="screen" id="screen">0</div>
    <div class="buttons">
      <button class="btn clear" id="clear">C</button>
      <button class="btn clear" id="clearAll">AC</button>
      <button data-digit = '**' class="btn calc">^</button>
      <button data-digit = '/' class="btn calc" >÷</button>
      <button data-digit = '9' class="btn calc" >9</button>
      <button data-digit = '8' class="btn calc" >8</button>
      <button data-digit = '7' class="btn calc" >7</button>
      <button data-digit = '*' class="btn calc" >×</button>
      <button data-digit = '6' class="btn calc">6</button>
      <button data-digit = '5' class="btn calc" >5</button>
      <button data-digit = '4' class="btn calc" >4</button>
      <button data-digit = '-' class="btn calc" >-</button>
      <button data-digit = '3' class="btn calc" >3</button>
      <button data-digit = '2' class="btn calc" >2</button>
      <button data-digit = '1' class="btn calc" >1</button>
      <button data-digit = '+' class="btn calc" >+</button>
      <button data-digit = '00' class="btn calc">00</button>
      <button data-digit = '0' class="btn calc">0</button>
      <button data-digit = '.' class="btn calc">.</button>
      <button class="btn equal">=</button>
    </div>
  </div>
  <script src="calculator.js"></script>
</body>

</html>
